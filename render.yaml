services:
  - type: web
    name: sanad-ai
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEBUG_MODE
        value: "false"              # production default — leaks /api/debug/state when true
      - key: PORT
        value: "3030"
      # JWT signing key for officer + citizen session cookies. Must be set in
      # the Render dashboard (≥16 chars). lib/auth.js fails fast on boot if
      # missing — silently shipping with the dev placeholder is worse than
      # crashing at startup.
      - key: JWT_SECRET
        sync: false
      - key: DB_URL
        value: file:./data/sanad.db # swap for libsql://… on Turso later
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_BASE_URL
        value: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - key: QWEN_MODEL
        value: qwen-plus
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET   # required to verify X-Hub-Signature-256 on inbound webhooks
        sync: false
      # Default agent provider — Claude. Picked over Qwen because Claude
      # follows our per-turn word/line caps + tool-use guard rails much
      # more reliably (qwen-plus produced verbose, off-spec replies in
      # production traces). lib/llm.js fails fast on boot if the API
      # key is missing in production.
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY     # chat / tool-calling backend (Claude)
        sync: false
      # Switched to Opus 4.5 on 2026-05-07 by user request. Trade-off
      # vs Sonnet: ~3× slower + ~5× per-token cost, gains stronger
      # reasoning and instruction-following. Flip back to
      # claude-sonnet-4-5 if latency becomes a complaint.
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-5
      - key: SANAD_AGENT_V2
        value: "true"
      # ── Public base URL — used to build Thawani success/cancel URLs,
      # WhatsApp webhook URL, and any redirect that needs an absolute origin.
      # Update this if your Render host gets a hash suffix or you point a
      # custom domain at the service.
      - key: PUBLIC_BASE_URL
        value: https://saned.ai
      # ── Thawani Pay.
      # Keys are dashboard secrets (sync:false) so production merchant
      # credentials are NEVER committed to the repo. For sandbox testing,
      # set these in the Render dashboard to Thawani's public UAT keys
      # (secret rRQ26GcsZzoEhbrP2HZvLYDbn9C9et /
      #  publishable HGvTMLDssJghr9tlN9gr4DVYt0qyBy) and THAWANI_ENV=sandbox.
      # For production: set the real merchant keys + THAWANI_ENV=production.
      - key: THAWANI_ENV
        value: production           # LIVE — production merchant keys set as dashboard secrets
      - key: THAWANI_SECRET_KEY
        sync: false
      - key: THAWANI_PUBLISHABLE_KEY
        sync: false
      - key: THAWANI_WEBHOOK_SECRET   # optional; only set if you wired a signed webhook on Thawani's dashboard
        sync: false
      # ── ADMIN_EMAILS — comma-separated platform-admin emails. REQUIRED in
      # production: server boot (lib/env.js assertProductionConfig) fails fast
      # without it, and it's the only way to reach the admin console + payouts
      # (the DEBUG fallback is hard-off in production).
      - key: ADMIN_EMAILS
        sync: false
      # ── Office plans (one-off time-based access purchases; NOT recurring —
      # Thawani doesn't support subscriptions). Off by default; enable per-rollout.
      - key: SANAD_SUBS_V1
        value: "false"              # set "true" to enable office plan purchases
      # ── Platform fee per settled request, in baisa (1000 baisa = 1 OMR).
      - key: PLATFORM_FEE_BAISA
        value: "500"                # 0.5 OMR per request
      # ── Test mirror — every outbound bot/officer message on a web session
      # also lands on this WhatsApp number. Lets you drive a session from any
      # browser while the conversation lands on your phone in real time.
      # Requires WHATSAPP_* creds above to be set, otherwise it's a no-op.
      - key: SANAD_TEST_PHONE
        value: "+96892888715"
    disk:
      name: sanad-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    healthCheckPath: /api/health
    autoDeploy: true
