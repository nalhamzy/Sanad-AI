name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: npm test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # tests/helpers.js wipes ./data/sanad-test.db at boot and forces all
      # external API keys to empty so heuristic mode is used. No secrets needed.
      - name: Run tests
        run: npm test
