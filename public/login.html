<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ساند · Saned — تسجيل الدخول · Sign in</title>
<meta name="theme-color" content="#0d9488"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/theme.css"/>
<style>
  body { font-family: 'Inter', sans-serif; }
  [dir="rtl"] body, html[dir="rtl"] * { font-family: 'Noto Kufi Arabic', sans-serif; }
  .page-bg {
    background:
      radial-gradient(900px 480px at 12% -10%, rgba(20,184,166,.10) 0%, transparent 55%),
      radial-gradient(700px 400px at 110% 0%, rgba(34,197,94,.08) 0%, transparent 55%),
      linear-gradient(180deg, #fbfaf6 0%, #f5f1e8 100%);
  }
  .wordmark { background: linear-gradient(135deg, #0d9488 0%, #15803d 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .otp-input { width: 2.75rem; height: 3.25rem; text-align: center; font-size: 1.5rem; font-weight: 700; border: 1.5px solid #e2e8f0; border-radius: 0.75rem; background: white; outline: none; transition: all .15s; }
  .otp-input:focus { border-color: #14b8a6; box-shadow: 0 0 0 3px rgba(20,184,166,.18); }
  .otp-input.has-value { border-color: #0d9488; background: #f0fdfa; }
</style>
</head>
<body class="min-h-screen text-slate-900 page-bg">

<header class="max-w-5xl mx-auto px-5 sm:px-6 py-5 flex items-center">
  <a href="/" class="flex items-center gap-3" aria-label="Saned home">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-green-700 text-white grid place-items-center text-lg font-black shadow-md">س</div>
    <div class="leading-tight">
      <div class="text-base font-extrabold wordmark" data-i18n="app.name"></div>
      <div class="text-[11px] text-slate-500" data-i18n="home.footer.tagline"></div>
    </div>
  </a>
  <div class="ms-auto flex items-center gap-2">
    <a href="/signup.html" class="text-sm font-semibold text-teal-700 hover:text-teal-800" data-i18n="auth.no_account"></a>
    <button id="langBtn" class="px-3 py-1.5 rounded-lg bg-white/80 hover:bg-white border border-slate-200 font-semibold text-xs shadow-sm" data-i18n="lang.toggle"></button>
  </div>
</header>

<main class="max-w-md mx-auto px-5 sm:px-6 py-6 sm:py-10">

  <div class="text-center mb-7 sm:mb-9">
    <h1 class="text-3xl sm:text-4xl font-black tracking-tight" data-i18n="auth.login.title"></h1>
    <p class="mt-2 text-slate-500 text-sm sm:text-base" data-i18n="auth.login.sub"></p>
  </div>

  <section id="step-phone" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-7">
    <label class="block text-sm font-semibold text-slate-700 mb-2" data-i18n="auth.phone_label"></label>
    <div class="flex items-stretch gap-2" dir="ltr">
      <div class="px-3 grid place-items-center bg-slate-100 rounded-xl border border-slate-200 text-sm font-bold text-slate-600">+968</div>
      <input id="phone" type="tel" inputmode="numeric" autocomplete="tel-national"
             class="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none text-base font-semibold tracking-wide"
             placeholder="9094 4196" maxlength="11" />
    </div>
    <button id="sendOtpBtn"
      class="mt-5 w-full px-5 py-3.5 rounded-xl bg-gradient-to-br from-teal-500 to-green-700 text-white font-bold text-base disabled:opacity-50 transition shadow-md">
      <span data-i18n="auth.send_otp"></span>
    </button>

    <div class="mt-5 flex items-center gap-3">
      <div class="flex-1 h-px bg-slate-200"></div>
      <div class="text-xs text-slate-400 font-semibold uppercase tracking-wider" data-i18n="auth.or"></div>
      <div class="flex-1 h-px bg-slate-200"></div>
    </div>
    <div id="googleBtnWrap" class="mt-4 flex justify-center">
      <div id="g_id_signin"></div>
    </div>
  </section>

  <section id="step-otp" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-7">
    <div class="flex items-center gap-3 mb-1">
      <button id="backToPhone" class="text-xs text-slate-500 hover:text-slate-800" aria-label="Back · العودة"><span aria-hidden="true">←</span></button>
      <div class="text-xs text-slate-500 font-semibold" id="otpPhoneEcho" dir="ltr">+968 …</div>
    </div>
    <div class="text-lg font-extrabold mt-2" data-i18n="auth.otp.title"></div>
    <p class="mt-1 text-sm text-slate-500" data-i18n="auth.otp.sub"></p>
    <div class="otp-row flex gap-2 sm:gap-3 justify-center mt-6 mb-2" dir="ltr">
      <input class="otp-input" type="tel" inputmode="numeric" maxlength="1" data-otp-i="0"/>
      <input class="otp-input" type="tel" inputmode="numeric" maxlength="1" data-otp-i="1"/>
      <input class="otp-input" type="tel" inputmode="numeric" maxlength="1" data-otp-i="2"/>
      <input class="otp-input" type="tel" inputmode="numeric" maxlength="1" data-otp-i="3"/>
      <input class="otp-input" type="tel" inputmode="numeric" maxlength="1" data-otp-i="4"/>
      <input class="otp-input" type="tel" inputmode="numeric" maxlength="1" data-otp-i="5"/>
    </div>
    <button id="verifyOtpBtn"
      class="mt-5 w-full px-5 py-3.5 rounded-xl bg-gradient-to-br from-teal-500 to-green-700 text-white font-bold text-base disabled:opacity-50 transition shadow-md">
      <span data-i18n="auth.verify"></span>
    </button>
    <div class="mt-4 text-center text-sm">
      <button id="resendBtn" class="text-teal-700 hover:text-teal-800 font-semibold disabled:text-slate-400 disabled:cursor-not-allowed">
        <span data-i18n="auth.resend"></span> <span id="resendTimer" class="text-slate-400"></span>
      </button>
    </div>
    <div id="debugCode" class="hidden mt-4 p-3 rounded-lg bg-amber-50 border border-amber-200 text-xs text-amber-800 font-mono"></div>
  </section>

  <p id="errBox" class="hidden mt-5 p-3.5 rounded-xl bg-rose-50 border border-rose-200 text-rose-800 text-sm"></p>

</main>

<script src="/i18n.js"></script>
<script src="/auth-client.js"></script>
<script src="/config.js" onerror="" defer></script>
</body>
</html>
