<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Log in · Sanad-AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="apple-touch-icon" href="/favicon.svg"/>
<meta name="theme-color" content="#0d9488"/>
<link rel="stylesheet" href="/theme.css"/>
<style>
  body { font-family: 'Inter', sans-serif; }
  .hero-bg {
    background:
      radial-gradient(1000px 500px at 10% -10%, rgba(14,124,134,.35) 0%, transparent 60%),
      radial-gradient(800px 400px at 110% 10%, rgba(18,110,61,.3) 0%, transparent 55%),
      linear-gradient(180deg, #fbf8f3, #f5efe4);
  }
  .wordmark { background: linear-gradient(135deg, #0e7c86, #126e3d); -webkit-background-clip: text; background-clip: text; color: transparent; }
  input:focus { outline: 2px solid #0e7c86; outline-offset: 1px; }
</style>
</head>
<body class="min-h-screen hero-bg text-slate-900">

<header class="max-w-5xl mx-auto px-6 py-5 flex items-center gap-3">
  <a href="/" class="flex items-center gap-3">
    <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-teal-500 to-green-700 text-white grid place-items-center text-xl font-extrabold shadow-md">S</div>
    <div>
      <div class="text-lg font-extrabold wordmark">Sanad-AI</div>
      <div class="text-[11px] text-slate-500">Office portal</div>
    </div>
  </a>
  <nav class="ms-auto text-sm">
    <a href="/office-signup.html" class="px-3 py-1.5 rounded-lg hover:bg-white/70 font-semibold">New here? Register →</a>
  </nav>
</header>

<main class="max-w-md mx-auto px-6 pt-8 pb-16">
  <h1 class="text-3xl font-extrabold mb-2">Welcome back</h1>
  <p class="text-slate-600 mb-6">Sign in to your Sanad office dashboard.</p>

  <form id="loginForm" class="bg-white/80 backdrop-blur rounded-2xl shadow-xl p-6 space-y-4 border border-white/60">
    <div>
      <label class="block text-sm font-semibold mb-1.5">Email</label>
      <input name="email" type="email" required autocomplete="username" class="w-full border border-slate-300 rounded-lg px-3 py-2"/>
    </div>
    <div>
      <label class="block text-sm font-semibold mb-1.5">Password</label>
      <input name="password" type="password" required autocomplete="current-password" class="w-full border border-slate-300 rounded-lg px-3 py-2"/>
    </div>
    <button type="submit" id="submitBtn"
      class="w-full py-2.5 rounded-xl bg-gradient-to-br from-teal-600 to-green-700 text-white font-bold shadow-lg hover:shadow-xl disabled:opacity-50">
      Log in
    </button>
    <div id="msg" class="hidden text-sm rounded-lg px-3 py-2"></div>
  </form>

  <p class="text-center text-sm text-slate-500 mt-5">
    Don't have an account? <a href="/office-signup.html" class="text-teal-700 font-bold">Register your office</a>
  </p>

  <div id="demoHint" class="hidden mt-4 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-[13px] text-amber-900">
    <div class="font-bold mb-1">🧪 Debug mode demo account</div>
    <div>Email: <span class="mono font-bold">khalid@nahdha.om</span></div>
    <div>Password: <span class="mono font-bold">demo123</span></div>
    <div class="text-[11px] opacity-75 mt-1">Pre-approved office with 999 credits. No payment required.</div>
    <button type="button" id="demoFill" class="mt-2 text-[12px] underline font-semibold">Fill form with demo credentials</button>
  </div>
</main>

<script>
const form = document.getElementById('loginForm');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('submitBtn');

function showMsg(text, ok = false) {
  msg.textContent = text;
  msg.className = `text-sm rounded-lg px-3 py-2 ${ok ? 'bg-emerald-50 text-emerald-800 border border-emerald-200' : 'bg-rose-50 text-rose-800 border border-rose-200'}`;
  msg.classList.remove('hidden');
}

const ERROR_MSG = {
  invalid_credentials: 'Email or password is incorrect.',
  account_disabled: 'Your account has been disabled. Contact your office admin.',
  missing_credentials: 'Please enter your email and password.'
};

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = 'Signing in…';
  const body = Object.fromEntries(new FormData(form).entries());
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
      credentials: 'include'
    });
    const data = await r.json();
    if (!r.ok) {
      showMsg(ERROR_MSG[data.error] || data.error || 'Login failed');
      btn.disabled = false; btn.textContent = 'Log in';
      return;
    }
    showMsg('✓ Signed in — redirecting…', true);
    // If this officer is a platform admin, go to admin; else officer dashboard.
    // The admin check is just email-based — the page itself will re-verify.
    const next = new URLSearchParams(location.search).get('next');
    setTimeout(() => { window.location.href = next || '/officer.html'; }, 500);
  } catch (err) {
    showMsg('Network error — please try again.');
    btn.disabled = false; btn.textContent = 'Log in';
  }
});

// Show the demo-credentials hint only when the server reports DEBUG_MODE on.
fetch('/api/health').then(r => r.json()).then(h => {
  if (h && h.debug) {
    document.getElementById('demoHint').classList.remove('hidden');
    document.getElementById('demoFill').addEventListener('click', () => {
      form.email.value = 'khalid@nahdha.om';
      form.password.value = 'demo123';
      form.email.focus();
    });
  }
}).catch(() => {});

// If already signed in, offer an explicit choice instead of silently redirecting.
// (Silent redirect made it impossible to switch accounts on the same machine.)
// Bypass this check entirely with ?fresh=1 in the URL.
var qs = new URLSearchParams(location.search);
if (!qs.has('fresh')) {
  fetch('/api/auth/me', { credentials: 'include' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (data) {
      if (!data || !data.officer) return;
      var banner = document.createElement('div');
      banner.className = 'mb-4 rounded-xl border border-teal-200 bg-teal-50 px-4 py-3 text-[13px] text-teal-900';
      var title = document.createElement('div');
      title.className = 'font-bold mb-1';
      title.textContent = 'Already signed in as ' + data.officer.email;
      var row = document.createElement('div');
      row.className = 'flex gap-2 mt-2';
      var cont = document.createElement('a');
      cont.href = '/officer.html';
      cont.className = 'px-3 py-1.5 rounded-lg bg-teal-700 text-white font-semibold text-[12px]';
      cont.textContent = 'Continue to dashboard →';
      var out = document.createElement('button');
      out.type = 'button';
      out.id = 'logoutBtn';
      out.className = 'px-3 py-1.5 rounded-lg border border-teal-300 bg-white font-semibold text-[12px]';
      out.textContent = 'Log out & switch account';
      row.appendChild(cont);
      row.appendChild(out);
      banner.appendChild(title);
      banner.appendChild(row);
      form.parentNode.insertBefore(banner, form);
      out.addEventListener('click', async function () {
        try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch (e) {}
        location.href = '/office-login.html?fresh=1';
      });
    })
    .catch(function () {});
}
</script>
</body>
</html>
