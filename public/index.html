  /* ── Page background — soft, warm, oman-flag adjacent ── */
  .page-bg {

      radial-gradient(900px 500px at 110% 0%, rgba(34,197,94,.08) 0%, transparent 55%),

  /* ── Wordmark (subtle, not gradient-shouty) ── */
  .wordmark {
    background: linear-gradient(135deg, #0d9488 0%, #15803d 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  /* ── WhatsApp brand button ── */
  .wa-btn {
    background: #25D366;
    box-shadow: 0 8px 20px -8px rgba(37,211,102,.6), 0 0 0 1px rgba(0,0,0,.04);
    transition: all .15s;
  }
  .wa-btn:hover { background: #1eb858; transform: translateY(-1px); box-shadow: 0 14px 28px -10px rgba(37,211,102,.55); }
  .wa-btn:active { transform: translateY(0); }
  /* ── Step number ── */
  .step-num {
    background: linear-gradient(135deg, #0d9488, #15803d);
    color: white;
    box-shadow: 0 8px 16px -8px rgba(13,148,136,.55);
  }
  /* ── Service card hover ── */
  .svc-card {
    transition: all .2s;
    will-change: transform;
  }
  .svc-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 36px -16px rgba(15,23,42,.18);
    border-color: rgba(20,184,166,.4);
  }
  /* ── FAQ summary marker ── */
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] .faq-chev { transform: rotate(180deg); }
  .faq-chev { transition: transform .2s; }
  /* ── Hide scrollbar in QR card ── */
  .qr-card svg, .qr-card canvas { display: block; max-width: 100%; height: auto; }

  /* ── Subtle decorative dots ── */
  .dots {
    background-image: radial-gradient(rgba(15,23,42,.06) 1.2px, transparent 1.2px);
    background-size: 24px 24px;
  }
</style>

<script>
(async function () {
  // Language toggle
  document.getElementById('langBtn').onclick = () => I18N.setLang(I18N.lang === 'ar' ? 'en' : 'ar');

  // Render the WhatsApp QR (canvas, brand teal-on-white)
  try {
    await QRCode.toCanvas(document.getElementById('waQR'), 'https://wa.me/96890944196', {
      width: 200,
      margin: 1,
      color: { dark: '#0d9488', light: '#ffffff' }
    });
  } catch (e) {
    console.warn('QR render failed', e);
  }

  // System status (small footer note)
  try {
    const h = await fetch('/api/health').then(r => r.json());
    const el = document.getElementById('systemStatus');
    if (h.ok && h.llm) { el.textContent = '● operational'; el.className = 'font-semibold text-emerald-600'; }
    else if (h.ok)     { el.textContent = '● limited (no LLM)'; el.className = 'font-semibold text-amber-600'; }
  } catch {}

  // Live trust counts — pull from existing endpoints
  try {
    const [state, entities, totalR] = await Promise.all([
      fetch('/api/debug/state').then(r=>r.json()),
      fetch('/api/catalogue/entities').then(r=>r.json()),
      fetch('/api/catalogue/search?q=&limit=1').then(r=>r.json())
    ]);
    document.getElementById('stat_services').textContent = (totalR.total || 0).toLocaleString();
    document.getElementById('stat_entities').textContent = (entities.entities?.length || 0);
    document.getElementById('stat_offices').textContent = (state.counts?.office || 0);
  } catch {
    // /api/debug/state is gated behind DEBUG_MODE in prod — silently fall back to static numbers
    document.getElementById('stat_services').textContent = '3,400+';
    document.getElementById('stat_entities').textContent = '50+';
    document.getElementById('stat_offices').textContent = '—';
  }
})();
</script>
