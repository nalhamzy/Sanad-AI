<script src="/i18n.js"></script>
<script>
(async function () {
  const $ = s => document.querySelector(s);
  const I18N = window.I18N;
  document.getElementById('langBtn').onclick = () => I18N.setLang(I18N.lang === 'ar' ? 'en' : 'ar');

  // ── QR ─────────────────────────────────────────────────
  try {
    await QRCode.toCanvas(document.getElementById('waQR'), 'https://wa.me/96890944196', {
      width: 200, margin: 1, color: { dark: '#0d9488', light: '#ffffff' }
    });
  } catch (e) {}

  // ── Health pill ────────────────────────────────────────
  try {
    const h = await fetch('/api/health').then(r => r.json());
    const el = document.getElementById('systemStatus');
    if (h.ok && h.llm) { el.textContent = '● operational'; el.className = 'font-semibold text-emerald-600'; }
    else if (h.ok)     { el.textContent = '● limited (no LLM)'; el.className = 'font-semibold text-amber-600'; }
  } catch {}

  // ── Trust counts ───────────────────────────────────────
  try {
    const [entities, totalR] = await Promise.all([
      fetch('/api/catalogue/entities').then(r => r.json()),
      fetch('/api/catalogue/search?q=&limit=1').then(r => r.json())
    ]);
    document.getElementById('stat_services').textContent = (totalR.total || 0).toLocaleString();
    document.getElementById('stat_entities').textContent = (entities.entities?.length || 0);
  } catch {
    document.getElementById('stat_services').textContent = '600+';
    document.getElementById('stat_entities').textContent = '50+';
  }
  try {
    const state = await fetch('/api/debug/state').then(r => r.json());
    document.getElementById('stat_offices').textContent = (state.counts?.office || '—');
  } catch {
    document.getElementById('stat_offices').textContent = '—';
  }

  // ── Service-card price enrichment ──────────────────────
  // Hit hybrid for each canonical card and pick top-1's fee_omr.
  document.querySelectorAll('.svc-card[data-q]').forEach(async card => {
    try {
      const q = card.dataset.q;
      const r = await fetch(`/api/catalogue/hybrid?q=${encodeURIComponent(q)}&limit=1`);
      const d = await r.json();
      const top = d.results?.[0];
      const feeEl = card.querySelector('.service-fee');
      if (top && top.fee_omr != null && feeEl) {
        feeEl.textContent = `${I18N.t('home.services.from')} ${top.fee_omr.toFixed(3)} OMR`;
      } else if (feeEl) {
        feeEl.textContent = '';
      }
    } catch {}
  });

  // ── Hero live search ───────────────────────────────────
  const heroSearch = $('#heroSearch');
  const heroResults = $('#heroResults');
  const heroClear = $('#heroSearchClear');
  let searchSeq = 0;
  function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
  function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  async function runHero(q) {
    const seq = ++searchSeq;
    if (!q.trim()) { heroResults.classList.add('hidden'); heroResults.innerHTML = ''; return; }
    const r = await fetch(`/api/catalogue/hybrid?q=${encodeURIComponent(q)}&limit=8`);
    const d = await r.json();
    if (seq !== searchSeq) return;
    const lang = I18N.lang;
    const rows = (d.results || []).map(x => {
      const name = (lang === 'ar' && x.name_ar) ? x.name_ar : (x.name_en || x.name_ar || '—');
      const entity = (lang === 'ar' && x.entity_ar) ? x.entity_ar : (x.entity_en || '');
      const fee = x.fee_omr != null ? `${x.fee_omr.toFixed(3)} OMR` : (x.fees_text || '');
      const time = (lang === 'ar' && x.avg_time_ar) ? x.avg_time_ar : (x.avg_time_en || '');
      const tags = (x.matched_by || []).map(t => `<span class="matched-chip matched-${t}">${t}</span>`).join('');
      // Route hero results to the structured apply form, NOT the chat. If
      // the visitor isn't signed in, /apply.html bounces them to
      // /login.html?next=… and resumes the form after sign-in.
      return `<a href="/apply.html?service=${x.id}" class="block px-4 py-3 hover:bg-slate-50 border-b border-slate-100 last:border-b-0">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="font-semibold text-slate-800 text-sm truncate">${escapeHtml(name)}</div>
            <div class="mt-1 flex flex-wrap items-center gap-2 text-xs text-slate-500">
              <span>${escapeHtml(entity)}</span>
              ${fee ? `<span>·</span><span class="font-semibold text-teal-700">${escapeHtml(fee)}</span>` : ''}
              ${time ? `<span>·</span><span>${escapeHtml(time)}</span>` : ''}
            </div>
          </div>
          <div class="flex flex-wrap gap-1 shrink-0">${tags}</div>
        </div>
      </a>`;
    }).join('');
    heroResults.innerHTML = rows ||
      `<div class="px-4 py-6 text-center text-sm text-slate-500">${I18N.t('account.search.empty')}</div>`;
    heroResults.classList.remove('hidden');
  }
  heroSearch.addEventListener('input', debounce(e => {
    const v = e.target.value.trim();
    heroClear.classList.toggle('hidden', !v);
    runHero(v);
  }, 200));
  heroClear.onclick = () => { heroSearch.value = ''; heroClear.classList.add('hidden'); heroResults.classList.add('hidden'); heroSearch.focus(); };
  document.addEventListener('click', e => {
    if (!heroResults.contains(e.target) && e.target !== heroSearch) heroResults.classList.add('hidden');
  });
  heroSearch.addEventListener('focus', () => {
    if (heroSearch.value.trim()) heroResults.classList.remove('hidden');
  });

  // ── Nav state ──────────────────────────────────────────
  try {
    const r = await fetch('/api/citizen-auth/me');
    if (r.ok) {
      document.getElementById('navSignIn')?.classList.add('hidden');
      document.getElementById('navSignUp')?.classList.add('hidden');
      document.getElementById('navAccount')?.classList.remove('hidden');
    }
  } catch {}
})();
</script>
